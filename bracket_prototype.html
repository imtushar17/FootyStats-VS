<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering Snap Bracket with Navigation Tabs</title>
    <!-- Outfit Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-card: rgba(17, 24, 39, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #0ea5e9;
            --accent-blue-glow: rgba(14, 165, 233, 0.3);
            --accent-gold: #eab308;
            --accent-gold-glow: rgba(234, 179, 8, 0.2);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            --card-height: 70px;
            --col-width: 250px;
        }

        body {
            background-color: #020617;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .prototype-title {
            text-align: center;
            margin-bottom: 16px;
        }

        .prototype-title h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prototype-title p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        /* Mobile Viewport Sandbox Frame */
        .phone-sandbox {
            width: 412px;
            height: 840px;
            background: var(--bg-dark);
            border-radius: 40px;
            border: 8px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Bezel Details */
        .phone-bezel-camera {
            width: 120px;
            height: 25px;
            background: #1e293b;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        /* Status Bar Mockup */
        .phone-status-bar {
            height: 38px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(9, 13, 22, 0.9);
            z-index: 999;
            box-sizing: border-box;
            user-select: none;
            margin-top: 5px;
        }

        .phone-status-bar .right-icons {
            display: flex;
            gap: 6px;
        }

        /* Header Navigation */
        .phone-header {
            padding: 14px 20px 8px 20px;
            background: rgba(9, 13, 22, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .phone-header h2 {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .phone-header .badge {
            background: rgba(14, 165, 233, 0.15);
            color: var(--accent-blue);
            font-size: 9px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        /* Round Tabs Bar (Sticky Navigation) */
        .round-tabs-bar {
            background: rgba(9, 13, 22, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 4px 12px 10px 12px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 10;
        }

        .round-tabs-bar::-webkit-scrollbar {
            display: none;
        }

        .round-tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }

        .round-tab-btn.active {
            background: var(--accent-blue);
            color: #020617;
            border-color: var(--accent-blue);
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        /* Viewport Container (Handles Vertical Scrolling) */
        .viewport-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            background: #06090f;
        }

        .viewport-container::-webkit-scrollbar {
            width: 4px;
        }

        .viewport-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Scalable Canvas Frame */
        .bracket-canvas {
            position: relative;
            width: 100%;
            height: 1480px; /* Transitions dynamically based on active column */
            transition: height 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Wrapper Container (Handles Horizontal Swipe and Snap) */
        .bracket-wrapper {
            display: flex;
            gap: 48px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 40px 81px; /* Neighbors peeking indicator */
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            position: relative;
            align-items: center;
        }

        .bracket-wrapper::-webkit-scrollbar {
            display: none;
        }

        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: var(--col-width);
            position: relative;
            gap: 16px;
            z-index: 2;
            scroll-snap-align: center;
            flex-shrink: 0;
            transition: opacity 0.3s;
            opacity: 0.4;
        }

        .bracket-column.active-round {
            opacity: 1;
        }

        /* Match Node Card */
        .bracket-match-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            position: relative;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            height: var(--card-height);
            width: 100%;
            box-sizing: border-box;
        }

        .bracket-match-node:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .bracket-match-node.active-path {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue-glow);
        }

        .bracket-node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 9px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .bracket-team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-main);
        }

        .bracket-team-info {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 80%;
        }

        .bracket-flag-img {
            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 1px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .bracket-team-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bracket-team-score {
            font-weight: 800;
            font-size: 12px;
        }

        .bracket-team-row.winner .bracket-team-name {
            color: #ffffff;
            font-weight: 800;
        }

        .bracket-team-row.loser .bracket-team-name,
        .bracket-team-row.loser .bracket-team-score {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* SVG Connections Overlay */
        .connections-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Navigation Dots */
        .dots-navigation {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 0 20px 0;
            background: #06090f;
            z-index: 10;
            border-top: 1px solid var(--border-color);
        }

        .dot-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .dot-indicator.active {
            background: var(--accent-blue);
            transform: scale(1.3);
            box-shadow: 0 0 6px var(--accent-blue-glow);
        }

        /* Unified Match Hub Drawer Overlay */
        .match-hub-drawer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 26, 0.98);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 16px 20px 30px 20px;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            max-height: 80%;
        }

        .match-hub-drawer.open {
            transform: translateY(0);
        }

        .hub-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 3px;
            border-radius: 14px;
            margin-bottom: 16px;
        }

        .hub-tab-btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 11px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hub-tab-btn.active {
            background: rgba(255,255,255,0.06);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hub-content-pane {
            display: none;
            overflow-y: auto;
            flex: 1;
        }

        .hub-content-pane.active {
            display: block;
        }

        /* Match Centre Details */
        .mc-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .mc-scoreline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 8px 0;
        }

        .mc-team-large {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100px;
        }

        .mc-team-large img {
            width: 48px;
            height: 32px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .mc-team-large span {
            font-size: 13px;
            font-weight: 800;
            text-align: center;
        }

        .mc-score-large {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
        }

        .mc-scorers {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            max-width: 250px;
            margin: 0 auto;
        }

        /* Stats list */
        .mc-stats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
        }

        .stat-bar-container {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin: 0 12px;
            border-radius: 2px;
            overflow: hidden;
            display: flex;
        }

        .stat-bar-left {
            height: 100%;
            background: var(--accent-blue);
        }

        .stat-bar-right {
            height: 100%;
            background: var(--accent-gold);
        }

        /* Timeline */
        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 4px 8px;
        }

        .journey-step {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            position: relative;
            padding-bottom: 16px;
        }

        .journey-step:last-child {
            padding-bottom: 0;
        }

        .journey-step::before {
            content: "";
            position: absolute;
            left: 9px;
            top: 20px;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .journey-step:last-child::before {
            display: none;
        }

        .journey-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #0a0f1a;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            flex-shrink: 0;
        }

        .journey-step.completed .journey-dot {
            border-color: var(--accent-blue);
            background: var(--accent-blue-soft);
        }

        .journey-step.active .journey-dot {
            border-color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.15);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .journey-dot::after {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .journey-step.completed .journey-dot::after {
            background: var(--accent-blue);
        }

        .journey-step.active .journey-dot::after {
            background: var(--accent-gold);
        }

        .journey-content {
            flex: 1;
        }

        .journey-round-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .journey-match-desc {
            font-size: 13px;
            font-weight: 700;
            margin-top: 2px;
            color: var(--text-main);
        }

        .drawer-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="prototype-title">
        <h1>Dynamic Snapping Bracket</h1>
        <p>Google/FIFA Clickable Round Tabs & Center Snap Swipe</p>
    </div>

    <!-- Phone Viewport -->
    <div class="phone-sandbox">
        <!-- Bezel Details -->
        <div class="phone-bezel-camera"></div>

        <!-- Mock Status Bar -->
        <div class="phone-status-bar">
            <span>9:41 AM</span>
            <div class="right-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- Header -->
        <div class="phone-header">
            <h2>Knockout Arena</h2>
            <span class="badge">Adaptive Grid</span>
        </div>

        <!-- Clickable Round Tabs Bar -->
        <div class="round-tabs-bar" id="tabs-bar">
            <button class="round-tab-btn active" data-col-index="0">Round of 32</button>
            <button class="round-tab-btn" data-col-index="1">Round of 16</button>
            <button class="round-tab-btn" data-col-index="2">Quarter-finals</button>
            <button class="round-tab-btn" data-col-index="3">Semi-finals</button>
            <button class="round-tab-btn" data-col-index="4">Finals</button>
        </div>

        <!-- Vertical Scroll Viewport -->
        <div class="viewport-container" id="viewport">
            <!-- Scalable Canvas -->
            <div class="bracket-canvas" id="canvas">
                <!-- SVG Connections overlay -->
                <svg class="connections-svg" id="connections-svg"></svg>
                
                <!-- Horizontal Scroll Wrapper -->
                <div class="bracket-wrapper" id="bracket-wrapper">
                    <!-- Columns loaded dynamically -->
                </div>
            </div>
        </div>

        <!-- Dots Indicator Navigation -->
        <div class="dots-navigation" id="dots-nav">
            <div class="dot-indicator active" data-col-index="0"></div>
            <div class="dot-indicator" data-col-index="1"></div>
            <div class="dot-indicator" data-col-index="2"></div>
            <div class="dot-indicator" data-col-index="3"></div>
            <div class="dot-indicator" data-col-index="4"></div>
        </div>

        <!-- Unified Match Hub Overlay (Modal Drawer) -->
        <div class="match-hub-drawer" id="match-hub">
            <div class="drawer-handle"></div>
            
            <div class="drawer-header">
                <div style="font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted);" id="hub-match-title">Match 97 • Quarter-final</div>
                <button class="drawer-close-btn" id="hub-close" aria-label="Close">✕</button>
            </div>

            <!-- Tab Switcher -->
            <div class="hub-tabs">
                <button class="hub-tab-btn active" id="tab-mc-btn">Match Centre</button>
                <button class="hub-tab-btn" id="tab-journey-btn">Bracket Journey</button>
            </div>

            <!-- Tab Pane 1: Match Centre -->
            <div class="hub-content-pane active" id="pane-mc">
                <div class="mc-header">
                    <div class="mc-scoreline">
                        <div class="mc-team-large">
                            <img id="mc-flag-home" src="" alt="" />
                            <span id="mc-name-home">Home</span>
                        </div>
                        <div class="mc-score-large" id="mc-score-text">2 - 1</div>
                        <div class="mc-team-large">
                            <img id="mc-flag-away" src="" alt="" />
                            <span id="mc-name-away">Away</span>
                        </div>
                    </div>
                    <div class="mc-scorers" id="mc-scorers-text">
                        Griezmann 43', Mbappé 78' <br> Hakimi 65'
                    </div>
                </div>

                <div class="mc-stats-list">
                    <div class="stat-row">
                        <span id="mc-stat-val-home">54%</span>
                        <span>Ball Possession</span>
                        <span id="mc-stat-val-away">46%</span>
                    </div>
                    <div class="stat-bar-container">
                        <div class="stat-bar-left" id="mc-stat-bar-home" style="width: 54%;"></div>
                        <div class="stat-bar-right" id="mc-stat-bar-away" style="width: 46%;"></div>
                    </div>

                    <div class="stat-row" style="margin-top: 8px;">
                        <span>14</span>
                        <span>Shots (On Target)</span>
                        <span>8</span>
                    </div>
                    <div class="stat-bar-container">
                        <div class="stat-bar-left" style="width: 63%;"></div>
                        <div class="stat-bar-right" style="width: 37%;"></div>
                    </div>
                </div>
            </div>

            <!-- Tab Pane 2: Bracket Journey -->
            <div class="hub-content-pane" id="pane-journey">
                <div class="timeline-container" id="timeline-box">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>
    </div>

            { id: "94", round: "r16", home: "USA", away: "Belgium", homeScore: 2, awayScore: 1, status: "FT", winner: "USA" },
            { id: "91", round: "r16", home: "Brazil", away: "Norway", homeScore: 1, awayScore: 2, status: "FT", winner: "Norway" },
            { id: "92", round: "r16", home: "Mexico", away: "England", homeScore: 1, awayScore: 2, status: "FT", winner: "England" },
            { id: "95", round: "r16", home: "Argentina", away: "Egypt", homeScore: 2, awayScore: 1, status: "FT", winner: "Argentina" },
            { id: "96", round: "r16", home: "Switzerland", away: "Colombia", homeScore: 2, awayScore: 1, status: "FT", winner: "Switzerland" },

            // Quarter-finals (QF)
            { id: "97", round: "qf", home: "France", away: "Morocco", homeScore: 2, awayScore: 1, status: "FT", winner: "France" },
            { id: "98", round: "qf", home: "Spain", away: "USA", homeScore: 1, awayScore: 1, homePen: 4, awayPen: 2, status: "FT", winner: "Spain" },
            { id: "99", round: "qf", home: "Norway", away: "England", homeScore: 1, awayScore: 2, status: "FT", winner: "England" },
            { id: "100", round: "qf", home: "Argentina", away: "Switzerland", homeScore: 2, awayScore: 0, status: "FT", winner: "Argentina" },

            // Semi-finals (SF)
            { id: "101", round: "sf", home: "France", away: "Spain", homeScore: 3, awayScore: 2, status: "FT", winner: "France" },
            { id: "102", round: "sf", home: "England", away: "Argentina", homeScore: 1, awayScore: 2, status: "FT", winner: "Argentina" },

            // Finals
            { id: "104", round: "final", home: "France", away: "Argentina", status: "Upcoming" },
            { id: "103", round: "final", home: "Spain", away: "England", status: "Upcoming" }
        ];

        const parentChildMap = {
            "89": ["74", "77"],
            "90": ["73", "75"],
            "93": ["83", "84"],
            "94": ["81", "82"],
            "91": ["76", "78"],
            "92": ["79", "80"],
            "95": ["86", "88"],
            "96": ["85", "87"],
            "97": ["89", "90"],
            "98": ["93", "94"],
            "99": ["91", "92"],
            "100": ["95", "96"],
            "101": ["97", "98"],
            "102": ["99", "100"],
            "104": ["101", "102"]
        };

        const flagCDN = {
            "Argentina": "ar", "France": "fr", "Spain": "es", "England": "gb-eng", "Germany": "de", "Brazil": "br", 
            "Portugal": "pt", "Morocco": "ma", "Netherlands": "nl", "Japan": "jp", "Sweden": "se", "Croatia": "hr",
            "Canada": "ca", "Belgium": "be", "USA": "us", "Norway": "no", "Switzerland": "ch", 
            "Colombia": "co", "Egypt": "eg", "Mexico": "mx", "Paraguay": "py", "South Africa": "za", "Austria": "at", 
            "Bosnia": "ba", "Senegal": "sn", "Ivory Coast": "ci", "Ecuador": "ec", "Congo DR": "cd", 
            "Cape Verde": "cv", "Australia": "au", "Algeria": "dz", "Ghana": "gh"
        };

        const getFlagHTML = (teamName) => {
            const code = flagCDN[teamName];
            if (code) {
                return `<img src="https://flagcdn.com/${code}.svg" class="bracket-flag-img" alt="${teamName} Flag" />`;
            }
            return `<span class="bracket-flag-tbd">🏳️</span>`;
        };

        const columnRounds = [
            { key: "r32", title: "Round of 32", className: "column-r32", ids: ["74", "77", "73", "75", "83", "84", "81", "82", "76", "78", "79", "80", "86", "88", "85", "87"] },
            { key: "r16", title: "Round of 16", className: "column-r16", ids: ["89", "90", "93", "94", "91", "92", "95", "96"] },
            { key: "qf", title: "Quarter-finals", className: "column-qf", ids: ["97", "98", "99", "100"] },
            { key: "sf", title: "Semi-finals", className: "column-sf", ids: ["101", "102"] },
            { key: "final", title: "Finals", className: "column-final", ids: ["104"] }
        ];

        let highlightedTeam = null;
        let zoomScale = 1.0; 
        const colHeights = [1480, 800, 460, 280, 160];

        // Render bracket columns inside the horizontal snap wrapper
        const renderBracketTree = () => {
            const container = document.getElementById("bracket-wrapper");
            container.innerHTML = "";

            const gamesMap = {};
            matchesData.forEach(g => {
                gamesMap[g.id] = g;
            });

            columnRounds.forEach((round, colIdx) => {
                const col = document.createElement("div");
                col.className = `bracket-column ${round.className}`;
                if (colIdx === 0) col.classList.add("active-round");
                col.id = `col-${round.key}`;

                round.ids.forEach((matchId) => {
                    const game = gamesMap[matchId];
                    if (!game) return;

                    const node = document.createElement("div");
                    node.className = `bracket-match-node`;
                    node.id = `node-${game.id}`;
                    node.setAttribute("data-match-id", game.id);

                    if (highlightedTeam && (game.home === highlightedTeam || game.away === highlightedTeam)) {
                        node.classList.add("active-path");
                    }

                    const isHomeWinner = game.winner === game.home;
                    const isAwayWinner = game.winner === game.away;

                    const scoreHomeText = game.homePen ? `${game.homeScore} (${game.homePen})` : game.homeScore;
                    const scoreAwayText = game.awayPen ? `${game.awayScore} (${game.awayPen})` : game.awayScore;

                    node.innerHTML = `
                        <div class="bracket-node-header">
                            <span>Match ${game.id}</span>
                            <span class="${game.status === 'Live' ? 'live-text' : ''}">${game.status}</span>
                        </div>
                        <div class="bracket-team-row ${isHomeWinner ? 'winner' : ''} ${isAwayWinner ? 'loser' : ''}">
                            <div class="bracket-team-info">
                                ${getFlagHTML(game.home)}
                                <span class="bracket-team-name">${game.home}</span>
                            </div>
                            <span class="bracket-team-score">${game.status === 'FT' ? scoreHomeText : ''}</span>
                        </div>
                        <div class="bracket-team-row ${isAwayWinner ? 'winner' : ''} ${isHomeWinner ? 'loser' : ''}">
                            <div class="bracket-team-info">
                                ${getFlagHTML(game.away)}
                                <span class="bracket-team-name">${game.away}</span>
                            </div>
                            <span class="bracket-team-score">${game.status === 'FT' ? scoreAwayText : ''}</span>
                        </div>
                    `;

                    node.addEventListener("click", () => {
                        openMatchHub(game);
                    });

                    col.appendChild(node);
                });

                container.appendChild(col);
            });
        };

        // Draw dynamic SVG connections
        const drawConnections = () => {
            const svg = document.getElementById("connections-svg");
            svg.innerHTML = "";

            const canvasRect = document.getElementById("canvas").getBoundingClientRect();

            Object.keys(parentChildMap).forEach(childId => {
                const childNode = document.getElementById(`node-${childId}`);
                if (!childNode) return;

                const parentIds = parentChildMap[childId];
                parentIds.forEach(parentId => {
                    const parentNode = document.getElementById(`node-${parentId}`);
                    if (!parentNode) return;

                    const parentRect = parentNode.getBoundingClientRect();
                    const childRect = childNode.getBoundingClientRect();

                    const x1 = parentRect.right - canvasRect.left;
                    const y1 = parentRect.top + parentRect.height / 2 - canvasRect.top;

                    const x2 = childRect.left - canvasRect.left;
                    const y2 = childRect.top + childRect.height / 2 - canvasRect.top;

                    const controlOffset = (x2 - x1) * 0.55;

                    const d = `M ${x1} ${y1} C ${x1 + controlOffset} ${y1}, ${x2 - controlOffset} ${y2}, ${x2} ${y2}`;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", d);
                    
                    if (highlightedTeam && 
                        (parentNode.classList.contains("active-path") && childNode.classList.contains("active-path"))) {
                        path.setAttribute("stroke", "var(--accent-blue)");
                        path.setAttribute("stroke-width", "3");
                        path.setAttribute("style", "filter: drop-shadow(0 0 4px var(--accent-blue-glow)); transition: stroke 0.2s;");
                    } else {
                        path.setAttribute("stroke", "rgba(255,255,255,0.06)");
                        path.setAttribute("stroke-width", "2");
                    }
                    path.setAttribute("fill", "none");

                    svg.appendChild(path);
                });
            });
        };

        // Open Match Hub
        const openMatchHub = (game) => {
            const hub = document.getElementById("match-hub");
            const roundLabels = { r32: "Round of 32", r16: "Round of 16", qf: "Quarter-final", sf: "Semi-final", final: "World Cup Final" };
            document.getElementById("hub-match-title").textContent = `Match ${game.id} • ${roundLabels[game.round]}`;

            document.getElementById("mc-flag-home").src = `https://flagcdn.com/${flagCDN[game.home]}.svg`;
            document.getElementById("mc-flag-away").src = `https://flagcdn.com/${flagCDN[game.away]}.svg`;
            document.getElementById("mc-name-home").textContent = game.home;
            document.getElementById("mc-name-away").textContent = game.away;

            const scoreHomeText = game.homePen ? `${game.homeScore} (${game.homePen})` : game.homeScore;
            const scoreAwayText = game.awayPen ? `${game.awayScore} (${game.awayPen})` : game.awayScore;
            document.getElementById("mc-score-text").textContent = game.status === "FT" ? `${scoreHomeText} - ${scoreAwayText}` : "VS";

            if (game.id === "97") {
                document.getElementById("mc-scorers-text").innerHTML = "Griezmann 43', Mbappé 78' <br> Hakimi 65'";
            } else if (game.id === "100") {
                document.getElementById("mc-scorers-text").innerHTML = "Messi 21' (P), Alvarez 54'";
            } else {
                document.getElementById("mc-scorers-text").innerHTML = game.status === "FT" ? `Goal Scored (15')` : "Kickoff time TBD";
            }

            populateJourneyTimeline(game.home, game.away);
            hub.classList.add("open");
        };

        const populateJourneyTimeline = (homeTeam, awayTeam) => {
            const container = document.getElementById("timeline-box");
            container.innerHTML = "";

            const getTeamTimelineHTML = (teamName, teamColor) => {
                const teamMatches = matchesData.filter(m => m.home === teamName || m.away === teamName);
                const roundOrder = ["r32", "r16", "qf", "sf", "final"];
                teamMatches.sort((a, b) => roundOrder.indexOf(a.round) - roundOrder.indexOf(b.round));

                let html = `<div style="margin-bottom: 12px;"><strong style="color:${teamColor}; font-size:13px;">${teamName}</strong></div>`;
                
                teamMatches.forEach(match => {
                    const isWinner = match.winner === teamName;
                    const statusClass = match.status === "FT" ? "completed" : "active";

                    let desc = "";
                    const opponent = match.home === teamName ? match.away : match.home;
                    if (match.status === "FT") {
                        const scoreText = match.home === teamName ? `${match.homeScore}-${match.awayScore}` : `${match.awayScore}-${match.homeScore}`;
                        desc = isWinner ? `Won vs ${opponent} (${scoreText})` : `Lost vs ${opponent} (${scoreText})`;
                    } else {
                        desc = `Scheduled vs ${opponent}`;
                    }

                    const roundNames = { r32: "R32", r16: "R16", qf: "QF", sf: "SF", final: "Final" };

                    html += `
                        <div class="journey-step ${statusClass}">
                            <div class="journey-dot"></div>
                            <div class="journey-content">
                                <div class="journey-round-title">${roundNames[match.round]}</div>
                                <div class="journey-match-desc" style="font-size:12px;">${desc}</div>
                            </div>
                        </div>
                    `;
                });
                return html;
            };

            const grid = document.createElement("div");
            grid.style.display = "grid";
            grid.style.gridTemplateColumns = "1fr 1fr";
            grid.style.gap = "20px";

            const homeCol = document.createElement("div");
            homeCol.innerHTML = getTeamTimelineHTML(homeTeam, "var(--accent-blue)");
            
            const awayCol = document.createElement("div");
            awayCol.innerHTML = getTeamTimelineHTML(awayTeam, "var(--accent-gold)");

            grid.appendChild(homeCol);
            grid.appendChild(awayCol);
            container.appendChild(grid);
        };

        // Close Hub
        document.getElementById("hub-close").addEventListener("click", () => {
            document.getElementById("match-hub").classList.remove("open");
            highlightedTeam = null;
            renderBracketTree();
            setTimeout(drawConnections, 50);
        });

        // Tab selection logic
        document.getElementById("tab-mc-btn").addEventListener("click", (e) => {
            document.getElementById("tab-mc-btn").classList.add("active");
            document.getElementById("tab-journey-btn").classList.remove("active");
            document.getElementById("pane-mc").classList.add("active");
            document.getElementById("pane-journey").classList.remove("active");
        });

        document.getElementById("tab-journey-btn").addEventListener("click", (e) => {
            document.getElementById("tab-journey-btn").classList.add("active");
            document.getElementById("tab-mc-btn").classList.remove("active");
            document.getElementById("pane-journey").classList.add("active");
            document.getElementById("pane-mc").classList.remove("active");

            const homeName = document.getElementById("mc-name-home").textContent;
            highlightedTeam = homeName;
            renderBracketTree();
            setTimeout(drawConnections, 50);
        });

        // Navigation Sync Logic (Tabs & Swipes)
        const wrapper = document.getElementById("bracket-wrapper"); // THE CORRECT HORIZONTAL SCROLL CONTAINER
        const tabs = document.querySelectorAll(".round-tab-btn");
        const dots = document.querySelectorAll(".dot-indicator");
        
        const colWidth = 250; // var(--col-width)
        const colGap = 48; // gap
        const stepWidth = colWidth + colGap;

        // Click on Header Tabs to Center that Column (scrolls the WRAPPER, not the viewport!)
        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                const colIdx = parseInt(tab.dataset.colIndex);
                const scrollTarget = colIdx * stepWidth;
                wrapper.scrollTo({ left: scrollTarget, behavior: 'smooth' });
            });
        });

        // Click on dot indicators to center
        dots.forEach(dot => {
            dot.addEventListener("click", () => {
                const colIdx = parseInt(dot.dataset.colIndex);
                wrapper.scrollTo({ left: colIdx * stepWidth, behavior: 'smooth' });
            });
        });

        // Scroll listener on the WRAPPER container
        wrapper.addEventListener("scroll", () => {
            const scrollLeft = wrapper.scrollLeft;
            
            // Determine active index based on scroll center
            const activeColIndex = Math.round(scrollLeft / stepWidth);
            
            // Update active header tabs
            tabs.forEach((tab, idx) => {
                if (idx === activeColIndex) {
                    tab.classList.add("active");
                    tab.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
                } else {
                    tab.classList.remove("active");
                }
            });

            // Update dots
            dots.forEach((dot, idx) => {
                if (idx === activeColIndex) {
                    dot.classList.add("active");
                } else {
                    dot.classList.remove("active");
                }
            });

            // Update column focus classes
            document.querySelectorAll(".bracket-column").forEach((col, idx) => {
                if (idx === activeColIndex) {
                    col.classList.add("active-round");
                } else {
                    col.classList.remove("active-round");
                }
            });

            // Transition canvas height dynamically based on active column
            if (colHeights[activeColIndex]) {
                document.getElementById("canvas").style.height = `${colHeights[activeColIndex]}px`;
            }

            // Redraw SVG connection lines
            drawConnections();
        });

        // Initial setup
        renderBracketTree();
        
        window.addEventListener("load", () => {
            setTimeout(() => {
                wrapper.scrollLeft = 0; // Center Round of 32
                document.getElementById("canvas").style.height = `${colHeights[0]}px`;
                drawConnections();
            }, 200);
        });

    </script>
</body>
</html>
